name: Flask CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: "Step 1: Checkout Repository Code"
      uses: actions/checkout@v4
    
    - name: "Step 2: Prepare Python 3.10 Environment"
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: "Step 3: Update pip and Install Required Dependencies"
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: "Step 4: Verify Flask Application Initializes Successfully"
      run: |
        # Verify that the Flask application can be imported without errors
        python -c "from app import create_app; create_app()"
        
    - name: "Step 5: Lint Python Code with Flake8 (Optional warnings/errors)"
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
