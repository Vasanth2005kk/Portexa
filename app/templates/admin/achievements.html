{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Achievements</div></div>
  <button class="btn btn-primary" onclick="document.getElementById('modal').classList.add('open')">+ Add Achievement</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Title</th><th>Date</th><th>Icon</th><th>Actions</th></tr></thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>
            <strong>{{ item.title }}</strong>
            <div style="font-size:.8rem;color:var(--text-dim);margin-top:.2rem">{{ (item.description or '')[:80] }}</div>
          </td>
          <td style="font-family:var(--font-mono);font-size:.8rem;color:var(--secondary)">{{ item.date }}</td>
          <td style="font-size:.85rem;color:var(--accent)">{{ item.icon }}</td>
          <td class="td-actions">
            <button class="btn btn-sm btn-ghost" onclick='editAch({{ item|tojson }})'>Edit</button>
            <form method="POST" action="/admin/achievements/delete/{{ item.id }}" onsubmit="return confirm('Delete?')"><button type="submit" class="btn btn-sm btn-danger">Del</button></form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Add Achievement</div>
    <form method="POST" action="/admin/achievements/save">
      <input type="hidden" name="id" id="f-id">
      <div class="form-grid">
        <div class="form-group full"><label>Title</label><input name="title" id="f-title" required></div>
        <div class="form-group full"><label>Description</label><textarea name="description" id="f-desc" rows="3"></textarea></div>
        <div class="form-group"><label>Date / Year</label><input name="date" id="f-date" placeholder="2023"></div>
        <div class="form-group">
          <label>Icon Slug</label>
          <select name="icon" id="f-icon">
            <option value="trophy">trophy 🏆</option>
            <option value="star">star ⭐</option>
            <option value="paper">paper 📄</option>
            <option value="mic">mic 🎤</option>
            <option value="default">default 🎯</option>
          </select>
        </div>
        <div class="form-group"><label>Order</label><input type="number" name="order_index" id="f-order" value="0"></div>
      </div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>
    </form>
  </div>
</div>
<script>
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function editAch(item){
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-title').textContent = 'Edit Achievement';
  document.getElementById('f-id').value = item.id || '';
  document.getElementById('f-title').value = item.title || '';
  document.getElementById('f-desc').value = item.description || '';
  document.getElementById('f-date').value = item.date || '';
  document.getElementById('f-icon').value = item.icon || 'trophy';
  document.getElementById('f-order').value = item.order_index || 0;
}
</script>
{% endblock %}
