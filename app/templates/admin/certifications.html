{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Certifications</div></div>
  <button class="btn btn-primary" onclick="document.getElementById('modal').classList.add('open')">+ Add Certification</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>Issuer</th><th>Issued</th><th>Expires</th><th>Actions</th></tr></thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td><strong>{{ item.name }}</strong></td>
          <td style="color:var(--text-dim)">{{ item.issuer }}</td>
          <td style="font-family:var(--font-mono);font-size:.8rem;color:var(--accent)">{{ item.date_issued }}</td>
          <td style="font-family:var(--font-mono);font-size:.8rem;color:var(--text-dim)">{{ item.expiry_date or '—' }}</td>
          <td class="td-actions">
            <button class="btn btn-sm btn-ghost" onclick="editCert({{ item|tojson }})">Edit</button>
            <form method="POST" action="/admin/certifications/delete/{{ item.id }}" onsubmit="return confirm('Delete?')"><button type="submit" class="btn btn-sm btn-danger">Del</button></form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Add Certification</div>
    <form method="POST" action="/admin/certifications/save">
      <input type="hidden" name="id" id="f-id">
      <div class="form-grid">
        <div class="form-group full"><label>Certification Name</label><input name="name" id="f-name" required></div>
        <div class="form-group"><label>Issuing Organization</label><input name="issuer" id="f-issuer"></div>
        <div class="form-group"><label>Date Issued</label><input name="date_issued" id="f-issued" placeholder="Mar 2023"></div>
        <div class="form-group"><label>Expiry Date</label><input name="expiry_date" id="f-expiry" placeholder="Mar 2026 (optional)"></div>
        <div class="form-group full"><label>Credential URL</label><input name="credential_url" id="f-url" placeholder="https://..."></div>
        <div class="form-group"><label>Order</label><input type="number" name="order_index" id="f-order" value="0"></div>
      </div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>
    </form>
  </div>
</div>
<script>
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function editCert(item){
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-title').textContent = 'Edit Certification';
  document.getElementById('f-id').value = item.id || '';
  document.getElementById('f-name').value = item.name || '';
  document.getElementById('f-issuer').value = item.issuer || '';
  document.getElementById('f-issued').value = item.date_issued || '';
  document.getElementById('f-expiry').value = item.expiry_date || '';
  document.getElementById('f-url').value = item.credential_url || '';
  document.getElementById('f-order').value = item.order_index || 0;
}
</script>
{% endblock %}
